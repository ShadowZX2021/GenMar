<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Monedas - Layout Horizontal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #1e272e;
    margin: 0;
    padding: 20px;
    color: #ecf0f1;
  }

  .container {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: flex-start;
    max-width: 1200px;
    margin: auto;
    flex-wrap: wrap;
  }

  .box {
    background: #2f3640;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    flex: 1;
    min-width: 300px;
  }

  .title {
    font-size: 1.5rem;
    margin-bottom: 20px;
    font-weight: 600;
    text-align: center;
    color: #00a8ff;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    background: #353b48;
    color: white;
  }

  input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 5px #00a8ff;
  }

  .convert-btn {
    background: #00a8ff;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: 0.3s;
  }

  .convert-btn:hover {
    background: #0097e6;
  }

  #resetButton {
    background: #e84118;
  }

  #resetButton:hover {
    background: #c23616;
  }

  #result {
    margin-top: 15px;
    font-weight: 600;
    text-align: center;
  }

  #history {
    max-height: 400px;
    overflow-y: auto;
    list-style: none;
    padding: 0;
  }

  #history li {
    padding: 8px;
    border-bottom: 1px solid #444;
    display: none;
  }

  /* NUEVO: layout monedas */
  .currency-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .swap-btn {
    background: #fbc531;
    border: none;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
    color: #2f3640;
    font-weight: bold;
  }

  .swap-btn:hover {
    background: #e1b12c;
  }

  @media (max-width: 900px) {
    .container {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

  <div class="container">
    <!-- Columna 1: Conversor -->
    <div class="box converter">
      <div class="title"><i class="fas fa-coins"></i> Conversor</div>
      <input type="number" id="amount" placeholder="Ingresa el monto">
      <select id="currencyFrom">
        <option value="USD">USD - Dólar</option>
        <option value="EUR">EUR - Euro</option>
        <option value="MXN">MXN - Peso Mexicano</option>
      </select>
      <select id="currencyTo">
        <option value="USD">USD - Dólar</option>
        <option value="EUR">EUR - Euro</option>
        <option value="MXN">MXN - Peso Mexicano</option>
      </select>
      <button id="convertButton" class="convert-btn">Convertir</button>
      <button id="resetButton" class="convert-btn" style="background:#e74c3c; margin-top:10px;">Reset</button>
      <div id="result"></div>
    </div>

    <!-- Columna 2: Gráfica -->
    <div class="box">
      <div class="title"><i class="fas fa-chart-line"></i> Gráfica</div>
      <canvas id="conversionChart" width="400" height="400"></canvas>
    </div>

    <!-- Columna 3: Historial -->
    <div class="box">
      <div class="title"><i class="fas fa-history"></i> Historial</div>
      <ul id="history"></ul>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="moneda.script.js"></script>

</body>
</html>
